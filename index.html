<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hai Linh | Creative Portfolio</title>

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:black;
    color:white;
    scroll-behavior:smooth;
    overflow-x:hidden;
}

/* ===== PARALLAX ===== */

.stars, .stars2{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-3;
}

.stars::after, .stars2::after{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(white 1px, transparent 1px);
    background-size:60px 60px;
    animation:moveStars linear infinite;
}

.stars::after{animation-duration:120s; opacity:0.4;}
.stars2::after{animation-duration:200s; opacity:0.2;}

@keyframes moveStars{
    from{transform:translateY(0);}
    to{transform:translateY(-1000px);}
}

/* ===== TWINKLE ===== */

.twinkle{
    position:fixed;
    width:100%;
    height:100%;
    z-index:-2;
    pointer-events:none;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:blink 2s infinite alternate;
}

@keyframes blink{
    from{opacity:0.2;}
    to{opacity:1;}
}

/* ===== GOLD ===== */

.gold{
    background:linear-gradient(90deg,#f6d365,#fda085,#f6d365);
    background-size:200% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:shine 4s linear infinite;
}

@keyframes shine{
    to{background-position:200% center;}
}

.name:hover{
    text-shadow:0 0 15px gold;
}

/* ===== NAV ===== */

nav{
    position:fixed;
    width:100%;
    display:flex;
    justify-content:center;
    gap:40px;
    padding:15px 0;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(8px);
    z-index:1000;
}

nav a{
    color:white;
    text-decoration:none;
}

nav a:hover{color:gold;}

section{
    padding:100px 12% 60px 12%;
}

/* ===== HERO ===== */

.hero{
    display:flex;
    align-items:center;
    gap:50px;
    padding-top:140px;
}

.profile-img{
    width:220px;
    height:270px;
    object-fit:cover;
    border-radius:50% / 40%;
    border:3px solid gold;
    box-shadow:0 0 25px gold;
}

/* ===== CARD ===== */

.card{
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:18px;
    margin-bottom:30px;
    backdrop-filter:blur(8px);
}

/* ===== IMAGE SWEEP ===== */

.image-wrapper{
    position:relative;
    overflow:hidden;
    border-radius:12px;
}

.image-wrapper img{
    width:100%;
    display:block;
}

.image-wrapper::after{
    content:"";
    position:absolute;
    top:0;
    left:-75%;
    width:50%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
    transform:skewX(-25deg);
}

.image-wrapper:hover::after{
    animation:sweep 1s ease;
}

@keyframes sweep{
    100%{left:125%;}
}

/* ===== GALLERY ===== */

.exp-gallery, .gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
}

.gallery{display:none;}
.gallery.active{display:grid;}

/* ===== PRODUCT BUTTON ===== */

.product-btn{
    padding:10px 22px;
    border:none;
    border-radius:30px;
    background:gold;
    color:black;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.product-btn:hover{
    transform:scale(1.05);
}

/* ===== SKILLS ===== */

.skill-item{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.star-rating{
    display:flex;
    gap:4px;
}

.star-skill{
    font-size:18px;
    position:relative;
    color:rgba(255,255,255,0.2);
}

.star-skill.full{
    color:gold;
}

.star-skill.half{
    color:rgba(255,255,255,0.2);
}

.star-skill.half::before{
    content:"★";
    position:absolute;
    left:0;
    top:0;
    width:50%;
    overflow:hidden;
    color:gold;
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="stars2"></div>
<div class="twinkle" id="twinkle"></div>

</nav>
